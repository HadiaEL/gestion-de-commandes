<tr>
  <td>{{ client.clientId }}</td>
  <td>{{ client.name }}</td>
  <td>{{ client.email }}</td>
  <td>{{ client.phone }}</td>
  <td class="actions">
    <button class="btn btn-edit" (click)="edit.emit(client)">✏️ Modifier</button>
    <button class="btn btn-delete" (click)="openDeleteModal()">🗑️ Supprimer</button>
  </td>
</tr>

@if (showDeleteModal) {
  <app-delete-modale
    [itemName]="client.name"
    [itemType]="'client'"
    (confirm)="onConfirmDelete()"
    (cancel)="onCancelDelete()"
  />
}
