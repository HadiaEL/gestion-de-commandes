<section class="orders">
  <h2>Liste des commandes</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Produit</th>
        <th>Quantité</th>
        <th>Total</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody>
      @for (order of ordersList; track order.id) {
        <app-order-item [order]="order" />
      }
    </tbody>
  </table>
</section>
