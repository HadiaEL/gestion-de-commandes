<tr>
  <td>{{ product().id }}</td>
  <td>{{ product().name }}</td>
  <td class="price">{{ product().price }} €</td>
  <td>{{ product().description }}</td>
  <td class="actions">
    <button class="btn btn-edit" (click)="edit.emit(product())">✏️ Modifier</button>
    <button class="btn btn-delete" (click)="confirmDelete()">🗑️ Supprimer</button>
  </td>
</tr>
