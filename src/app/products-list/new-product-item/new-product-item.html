<div class="backdrop"></div>
<dialog open>
  <h2>{{ isEditMode ? 'Modifier le Produit ' + entredProductName : 'Ajouter un produit' }}</h2>
  <form (ngSubmit)="onSubmit()">
    <p>
      <label for="title">Nom du produit</label>
      <input type="text" id="title" name="title" [(ngModel)]="entredProductName" [readonly]="isEditMode" />
    </p>

    <p>
      <label for="summary">Description</label>
      <textarea id="summary" rows="5" name="summary" [(ngModel)]="entredProductDescription" ></textarea>
    </p>

    <p>
      <label for="price">Prix</label>
      <input type="number" id="price" name="price" [(ngModel)]="entredProductPrice"/>
    </p>

    <p class="actions">
      <button type="button" (click)="onClose()">Annuler</button>
      <button type="submit">{{ isEditMode ? 'Modifier' : 'Créer' }}</button>
    </p>
  </form>
</dialog>
