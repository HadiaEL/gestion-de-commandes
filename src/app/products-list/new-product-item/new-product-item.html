<dialog open>
  <div class="form-overlay" (click)="onClose()">
    <form class="product-form" (ngSubmit)="onSubmit()" (click)="$event.stopPropagation()">
      <h3>{{ isEditMode ? 'Modifier le Produit ' + entredProductName : 'Ajouter un produit' }}</h3>

      <p>
        <label for="title">Nom du produit</label>
        <input
          type="text"
          id="title"
          name="title"
          [(ngModel)]="entredProductName"
          [readonly]="isEditMode"
        />
      </p>

      <p>
        <label for="summary">Description</label>
        <textarea
          id="summary"
          rows="5"
          name="summary"
          [(ngModel)]="entredProductDescription"
        ></textarea>
      </p>

      <p>
        <label for="price">Prix</label>
        <input type="number" id="price" name="price" [(ngModel)]="entredProductPrice" />
      </p>

      <div class="form-actions">
        <button type="submit" class="btn btn-save">Enregistrer</button>
        <button type="button" class="btn btn-cancel" (click)="onClose()">Annuler</button>
      </div>
    </form>
  </div>
</dialog>
