<tr>
  <td>{{ product.productId }}</td>
  <td>{{ product.name }}</td>
  <td class="price">{{ product.price }} €</td>
  <td>{{ product.description }}</td>
  <td class="actions">
    <button class="btn btn-edit" (click)="onUpdateProduct(product)">✏️ Modifier</button>
    <button class="btn btn-delete" (click)="onDeleteProduct(product)">🗑️ Supprimer</button>
  </td>
</tr>

@if (showConfirmDelete) {
  <app-delete-modale
    [itemName]="product.name"
    [itemType]="'produit'"
    (confirm)="onConfirmDelete()"
    (cancel)="onCancelDelete()"
  />
}
